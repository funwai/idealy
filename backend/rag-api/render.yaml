services:
  - type: web
    name: funwai-rag-api
    env: python
    rootDir: backend/rag-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      # FIREBASE_SERVICE_ACCOUNT_JSON should be set in Render dashboard
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false  # Don't commit this value
    healthCheckPath: /
